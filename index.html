<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rabbit Storage | Private Cloud</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #7c3aed; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .glass { background: var(--card); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .admin-trigger { position: fixed; top: 20px; right: 20px; cursor: pointer; padding: 10px; opacity: 0.6; transition: 0.3s; z-index: 100; }
        .admin-trigger:hover { opacity: 1; color: var(--primary); transform: scale(1.1); }
        .container { width: 100%; max-width: 400px; padding: 40px 30px; text-align: center; margin: 20px; }
        h2 { margin-bottom: 25px; font-weight: 700; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.8); color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.2); }
        button { width: 100%; padding: 14px; border-radius: 12px; border: none; background: var(--primary); color: white; font-weight: 600; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        button:hover { filter: brightness(1.2); transform: translateY(-1px); }
        .admin-list { margin-top: 30px; text-align: left; max-height: 350px; overflow-y: auto; padding-right: 5px; }
        .photo-item { display: flex; align-items: center; gap: 15px; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .photo-item:hover { background: rgba(255,255,255,0.03); }
        .photo-item img { width: 45px; height: 45px; border-radius: 8px; object-fit: cover; }
        .photo-info { flex-grow: 1; font-size: 14px; }
        .actions i { cursor: pointer; margin-left: 12px; transition: 0.2s; opacity: 0.7; }
        .actions i:hover { opacity: 1; color: var(--primary); }
        .fa-trash:hover { color: #ef4444 !important; }
        #photo-display img { width: 100%; border-radius: 16px; margin-top: 25px; border: 1px solid rgba(255,255,255,0.1); animation: zoomIn 0.4s ease; }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .hidden { display: none; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="admin-trigger" onclick="openAdmin()"><i class="fas fa-user-gear fa-2xl"></i></div>

    <div class="container glass" id="user-ui">
        <h2><i class="fas fa-key"></i> Введите ключ</h2>
        <input type="text" id="client-key" placeholder="4-значный код доступа" inputmode="numeric">
        <button onclick="viewPhoto()" id="view-btn">Просмотреть</button>
        <div id="photo-display"></div>
    </div>

    <div class="container glass hidden" id="admin-ui">
        <h2>Управление диском</h2>
        <input type="file" id="file-upload">
        <button onclick="uploadPhoto()" id="upload-btn"><i class="fas fa-upload"></i> Загрузить на ПК</button>
        
        <div class="admin-list" id="admin-list">
            </div>
        
        <button onclick="location.reload()" style="background:transparent; border:1px solid rgba(255,255,255,0.2); margin-top:20px;">
            <i class="fas fa-arrow-left"></i> На главную
        </button>
    </div>

    <script>
        // ВСТАВЬ СВОЮ ССЫЛКУ ИЗ NGROK НИЖЕ
        const API = 'https://long-unhalted-roberta.ngrok-free.dev';

        // Вход в админку
        function openAdmin() {
            const pass = prompt("Доступ для администратора:");
            if (pass === "771") {
                document.getElementById('user-ui').classList.add('hidden');
                document.getElementById('admin-ui').classList.remove('hidden');
                refreshAdminList();
            }
        }

        // Загрузка фото на твой ПК
        async function uploadPhoto() {
            const fileInput = document.getElementById('file-upload');
            const btn = document.getElementById('upload-btn');
            if (!fileInput.files[0]) return alert("Выбери файл!");

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Загрузка...';
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const res = await fetch(`${API}/upload`, { method: 'POST', body: formData });
                const data = await res.json();
                alert(`Файл на базе! Ключ: ${data.key}`);
                fileInput.value = '';
                refreshAdminList();
            } catch (e) {
                alert("Ошибка! Сервер 1.py или ngrok не запущены.");
            } finally {
                btn.innerHTML = '<i class="fas fa-upload"></i> Загрузить на ПК';
            }
        }

        // Получение всех файлов для админки
        async function refreshAdminList() {
            try {
                const res = await fetch(`${API}/get_all`);
                const data = await res.json();
                const list = document.getElementById('admin-list');
                list.innerHTML = '<p style="font-size:12px; color:rgba(255,255,255,0.5)">Ваши файлы на диске:</p>';
                
                for (let key in data) {
                    list.innerHTML += `
                        <div class="photo-item">
                            <img src="${data[key].url}">
                            <div class="photo-info"><b>${key}</b></div>
                            <div class="actions">
                                <i class="fas fa-pen-to-square" title="Сменить код" onclick="editKey('${key}')"></i>
                                <i class="fas fa-trash" title="Удалить" onclick="deletePhoto('${key}')"></i>
                            </div>
                        </div>`;
                }
            } catch (e) { console.error("Ошибка обновления списка"); }
        }

        // Удаление фото
        async function deletePhoto(key) {
            if (confirm(`Удалить файл с кодом ${key}?`)) {
                await fetch(`${API}/delete/${key}`, { method: 'DELETE' });
                refreshAdminList();
            }
        }

        // Смена кода фото
        async function editKey(oldKey) {
            const newKey = prompt("Введите новый код:", oldKey);
            if (newKey && newKey !== oldKey) {
                await fetch(`${API}/update_key`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ old_key: oldKey, new_key: newKey })
                });
                refreshAdminList();
            }
        }

        // Просмотр фото пользователем
        async function viewPhoto() {
            const key = document.getElementById('client-key').value;
            const display = document.getElementById('photo-display');
            const btn = document.getElementById('view-btn');
            if (!key) return;

            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';
            try {
                const res = await fetch(`${API}/get_photo/${key}`);
                if (res.ok) {
                    const data = await res.json();
                    display.innerHTML = `
                        <img src="${data.url}">
                        <a href="${data.url}" download style="color:var(--primary); text-decoration:none; display:block; margin-top:15px; font-weight:600;">
                            <i class="fas fa-download"></i> Сохранить оригинал
                        </a>`;
                } else {
                    display.innerHTML = '<p style="color:#ef4444; margin-top:20px;">Ключ не найден!</p>';
                }
            } catch (e) {
                alert("Нет связи с сервером ПК.");
            } finally {
                btn.innerHTML = 'Просмотреть';
            }
        }
    </script>
</body>
</html>
