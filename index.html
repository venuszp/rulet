<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rabbit Cloud | Pro Max</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/pinch-zoom-js@2.3.4/dist/pinch-zoom.umd.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #7c3aed; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --danger: #ef4444; --success: #10b981; }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); }
        .container { width: 100%; max-width: 400px; padding: 40px 30px; text-align: center; margin: 20px; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); position: relative; z-index: 10; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px) scale(0.92); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake { animation: shake 0.3s ease-in-out 2; }

        /* Fullscreen Viewer */
        #viewer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 2000; cursor: zoom-out; }
        #viewer-content { width: 90vw; height: 90vh; display: flex; justify-content: center; align-items: center; }
        #viewer-img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 10px; cursor: grab; }

        /* Toasts */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 15px 25px; border-radius: 12px; background: var(--card); border-left: 5px solid var(--primary); animation: toastIn 0.4s ease forwards; min-width: 220px; display: flex; align-items: center; gap: 10px; }
        @keyframes toastIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .toast.error { border-left-color: var(--danger); }
        .toast.success { border-left-color: var(--success); }

        input, select { width: 100%; padding: 16px; margin: 8px 0; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.9); color: white; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 15px; }
        input:focus { border-color: var(--primary); }

        button { width: 100%; padding: 16px; border-radius: 16px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { transform: translateY(-2px); filter: brightness(1.2); }

        /* Admin UI */
        .admin-list { margin-top: 25px; text-align: left; max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .item { display: flex; align-items: center; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .item b { color: var(--primary); }
        .item-actions { display: flex; gap: 15px; align-items: center; }
        .fa-eye:hover { color: var(--primary); cursor: pointer; }
        .fa-trash:hover { color: var(--danger); cursor: pointer; }

        .hidden { display: none; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal { width: 320px; padding: 30px; text-align: center; border-radius: 28px; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="viewer-overlay" onclick="closeViewer(event)">
        <div id="viewer-content">
            <img src="" id="viewer-img">
        </div>
    </div>

    <div class="admin-trigger" style="position:fixed; top:25px; right:25px; cursor:pointer; opacity:0.5" onclick="showModal('auth-modal')"><i class="fas fa-fingerprint fa-2xl"></i></div>

    <div class="container glass" id="user-ui">
        <h2><i class="fas fa-ghost"></i> Rabbit Storage</h2>
        <input type="text" id="user-key" placeholder="Введите код" inputmode="numeric" maxlength="4">
        <button onclick="getPhoto()">Проверить базу</button>
        <div id="preview-box" style="margin-top:20px; display:none; cursor:pointer" onclick="openViewer()">
            <img id="small-preview" style="width:100%; border-radius:15px; border:1px solid rgba(255,255,255,0.1)">
            <p style="font-size:10px; opacity:0.5; margin-top:5px">Нажми, чтобы увеличить</p>
        </div>
    </div>

    <div class="container glass hidden" id="admin-ui">
        <h2><i class="fas fa-crown"></i> Admin Space</h2>
        <input type="text" id="admin-url" placeholder="URL изображения">
        <select id="admin-limit">
            <option value="1">1 использование</option>
            <option value="5">5 использований</option>
            <option value="10">10 использований</option>
            <option value="999999">Безлимит</option>
        </select>
        <button onclick="addPhoto()">Создать ключ</button>
        <div class="admin-list" id="admin-list"></div>
        <button onclick="location.reload()" style="background:transparent; border:1px solid #475569; margin-top:15px">Выйти</button>
    </div>

    <div class="modal-overlay" id="auth-modal">
        <div class="modal glass" id="auth-box">
            <h3>Вход</h3>
            <input type="password" id="admin-pass" placeholder="Пароль">
            <button onclick="checkPass()">Войти</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTcH3_tri2L7AHLh1e-YD-0s-QSthuE6Q",
            authDomain: "disk-c98ee.firebaseapp.com",
            databaseURL: "https://disk-c98ee-default-rtdb.firebaseio.com",
            projectId: "disk-c98ee",
            storageBucket: "disk-c98ee.firebasestorage.app",
            messagingSenderId: "59577059636",
            appId: "1:59577059636:web:e98f456d054cc360747d61"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let pz = null;
        let currentImgUrl = "";

        function notify(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            t.innerHTML = `<span>${msg}</span>`;
            container.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 3000);
        }

        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function checkPass() {
            const box = document.getElementById('auth-box');
            if(document.getElementById('admin-pass').value === "771") {
                closeModal('auth-modal');
                document.getElementById('user-ui').classList.add('hidden');
                document.getElementById('admin-ui').classList.remove('hidden');
                loadList();
            } else {
                box.classList.add('shake');
                setTimeout(() => box.classList.remove('shake'), 600);
                notify("Доступ запрещен", "error");
            }
        }

        function addPhoto() {
            const url = document.getElementById('admin-url').value;
            const limit = parseInt(document.getElementById('admin-limit').value);
            if(!url) return notify("Введите ссылку", "error");
            const key = Math.floor(1000 + Math.random() * 9000);
            db.ref('photos/' + key).set({ url, uses: limit }, () => {
                notify(`Код ${key} готов!`, "success");
                document.getElementById('admin-url').value = '';
            });
        }

        function getPhoto() {
            const key = document.getElementById('user-key').value;
            db.ref('photos/' + key).once('value').then(snap => {
                const data = snap.val();
                if(data && data.uses > 0) {
                    currentImgUrl = data.url;
                    document.getElementById('preview-box').style.display = 'block';
                    document.getElementById('small-preview').src = data.url;
                    
                    // Уменьшаем кол-во попыток
                    let newUses = data.uses - 1;
                    if(newUses <= 0 && data.uses < 900000) {
                        db.ref('photos/' + key).remove();
                    } else {
                        db.ref('photos/' + key).update({ uses: newUses });
                    }
                    notify("Фото найдено!", "success");
                } else { notify("Код недействителен", "error"); }
            });
        }

        function openViewer() {
            const overlay = document.getElementById('viewer-overlay');
            const img = document.getElementById('viewer-img');
            img.src = currentImgUrl;
            overlay.style.display = 'flex';
            if (pz) pz.destroy();
            pz = new PinchZoom(img, { minZoom: 1, maxZoom: 5, wheelZoomFactor: 1.1 });
        }

        function closeViewer(e) {
            if(e.target.id === 'viewer-overlay' || e.target.id === 'viewer-content') {
                document.getElementById('viewer-overlay').style.display = 'none';
            }
        }

        function loadList() {
            db.ref('photos').on('value', snap => {
                const list = document.getElementById('admin-list');
                list.innerHTML = '';
                const data = snap.val();
                for(let key in data) {
                    let u = data[key].uses > 1000 ? "∞" : data[key].uses;
                    list.innerHTML += `
                        <div class="item">
                            <span><b>${key}</b> (осталось: ${u})</span>
                            <div class="item-actions">
                                <i class="fas fa-eye" onclick="adminPreview('${data[key].url}')"></i>
                                <i class="fas fa-trash" onclick="db.ref('photos/${key}').remove()"></i>
                            </div>
                        </div>`;
                }
            });
        }

        function adminPreview(url) {
            currentImgUrl = url;
            openViewer();
        }
    </script>
</body>
</html>
