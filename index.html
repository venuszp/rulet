<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rabbit Cloud | Pro Max</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/pinch-zoom-js@2.3.4/dist/pinch-zoom.umd.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #7c3aed; 
            --bg: #0f172a; 
            --card: rgba(30, 41, 59, 0.7); 
            --danger: #ef4444; 
            --success: #10b981; 
        }

        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: #f8fafc; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            overflow: hidden; 
        }

        .glass { 
            background: var(--card); 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 28px; 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); 
        }

        .container { 
            width: 100%; 
            max-width: 400px; 
            padding: 40px 30px; 
            text-align: center; 
            margin: 20px; 
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
            position: relative; 
            z-index: 10; 
        }

        @keyframes slideUp { 
            from { opacity: 0; transform: translateY(40px) scale(0.92); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        @keyframes shake { 
            0%, 100% { transform: translateX(0); } 
            25% { transform: translateX(-10px); } 
            75% { transform: translateX(10px); } 
        }
        .shake { animation: shake 0.3s ease-in-out 2; }

        /* Fullscreen Viewer */
        #viewer-overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.92); 
            backdrop-filter: blur(15px); 
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 2000; 
            cursor: zoom-out; 
            animation: fadeIn 0.3s;
        }
        #viewer-content { width: 95vw; height: 95vh; display: flex; justify-content: center; align-items: center; }
        #viewer-img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; cursor: grab; }

        /* Toasts */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { 
            padding: 15px 25px; 
            border-radius: 12px; 
            background: var(--card); 
            backdrop-filter: blur(10px);
            border-left: 5px solid var(--primary); 
            animation: toastIn 0.4s ease forwards; 
            min-width: 220px; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            box-shadow: 0 10px 15px rgba(0,0,0,0.2);
        }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.error { border-left-color: var(--danger); }
        .toast.success { border-left-color: var(--success); }

        input, select { 
            width: 100%; 
            padding: 16px; 
            margin: 8px 0; 
            border-radius: 16px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(15, 23, 42, 0.9); 
            color: white; 
            box-sizing: border-box; 
            outline: none; 
            transition: 0.3s; 
            font-size: 15px; 
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.2); }

        button { 
            width: 100%; 
            padding: 16px; 
            border-radius: 16px; 
            border: none; 
            background: var(--primary); 
            color: white; 
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 10px; 
            font-size: 16px;
        }
        button:hover { transform: translateY(-2px); filter: brightness(1.2); }

        /* Admin UI */
        .admin-trigger { position: fixed; top: 25px; right: 25px; cursor: pointer; padding: 10px; opacity: 0.4; transition: 0.4s; z-index: 100; color: white; }
        .admin-trigger:hover { opacity: 1; color: var(--primary); transform: rotate(180deg); }

        .admin-list { margin-top: 25px; text-align: left; max-height: 250px; overflow-y: auto; padding-right: 5px; }
        .item { display: flex; align-items: center; justify-content: space-between; padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .item b { color: var(--primary); }
        .item-actions { display: flex; gap: 15px; align-items: center; }
        .fa-eye:hover { color: var(--primary); cursor: pointer; }
        .fa-trash:hover { color: var(--danger); cursor: pointer; }

        .hidden { display: none; }

        /* Modals */
        .modal-overlay { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(10px); 
            display: none; 
            justify-content: center; 
            align-items: center; 
            z-index: 1000; 
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal { width: 330px; padding: 35px; text-align: center; border-radius: 30px; animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="viewer-overlay" onclick="closeViewer(event)">
        <div id="viewer-content">
            <img src="" id="viewer-img">
        </div>
    </div>

    <div class="admin-trigger" onclick="showModal('auth-modal')">
        <i class="fas fa-fingerprint fa-2xl"></i>
    </div>

    <div class="container glass" id="user-ui">
        <h2><i class="fas fa-ghost"></i> Rabbit Storage</h2>
        <input type="text" id="user-key" placeholder="Введите код доступа" inputmode="numeric" maxlength="4">
        <button onclick="getPhoto()" id="view-btn">Проверить базу</button>
        
        <div id="preview-box" style="margin-top:25px; display:none; cursor:pointer" onclick="openViewer()">
            <img id="small-preview" style="width:100%; border-radius:18px; border:1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 20px rgba(0,0,0,0.3);">
            <p style="font-size:11px; opacity:0.5; margin-top:10px;"><i class="fas fa-expand"></i> Нажми, чтобы увеличить</p>
        </div>
    </div>

    <div class="container glass hidden" id="admin-ui">
        <h2><i class="fas fa-crown"></i> Admin Space</h2>
        <input type="text" id="admin-url" placeholder="Прямая ссылка на фото">
        <select id="admin-limit">
            <option value="1">1 использование</option>
            <option value="5">5 использований</option>
            <option value="10">10 использований</option>
            <option value="999999">Безлимитный доступ</option>
        </select>
        <button onclick="addPhoto()"><i class="fas fa-plus"></i> Создать ключ</button>
        
        <div class="admin-list" id="admin-list"></div>
        
        <button onclick="location.reload()" style="background:transparent; border:1px solid #475569; margin-top:20px; font-size: 14px;">
            <i class="fas fa-house"></i> Выход
        </button>
    </div>

    <div class="modal-overlay" id="auth-modal" onclick="closeAuthOnClick(event)">
        <div class="modal glass" id="auth-box" onclick="event.stopPropagation()">
            <h3>Доступ админа</h3>
            <p style="font-size: 12px; opacity: 0.6; margin-bottom: 20px;">Введите пароль системы</p>
            <input type="password" id="admin-pass" placeholder="••••" style="text-align: center; letter-spacing: 4px;">
            <button onclick="checkPass()">Войти</button>
            <button onclick="closeModal('auth-modal')" style="background:transparent; color:#94a3b8; font-size:13px; margin-top: 10px;">
                Отмена
            </button>
        </div>
    </div>

    <div class="modal-overlay" id="confirm-modal">
        <div class="modal glass">
            <i class="fas fa-triangle-exclamation fa-3x" style="color:var(--danger); margin-bottom:15px"></i>
            <h3>Удалить код?</h3>
            <p id="confirm-text" style="opacity:0.6; font-size:14px"></p>
            <button id="confirm-yes" style="background:var(--danger)">Да, стереть</button>
            <button onclick="closeModal('confirm-modal')" style="background:transparent; color:#94a3b8;">Назад</button>
        </div>
    </div>

        function notify(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const t = document.createElement('div');
            t.className = `toast ${type}`;
            const icon = type === 'error' ? 'fa-circle-xmark' : (type === 'success' ? 'fa-circle-check' : 'fa-circle-info');
            t.innerHTML = `<i class="fas ${icon}"></i><span>${msg}</span>`;
            container.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 3000);
