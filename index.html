<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rabbit Cloud | Ultra Custom</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/pinch-zoom-js@2.3.4/dist/pinch-zoom.umd.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #7c3aed; --bg: #0f172a; --card: rgba(30, 41, 59, 0.7); --danger: #ef4444; --success: #10b981; }
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .glass { background: var(--card); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6); }
        .container { width: 100%; max-width: 400px; padding: 40px 30px; text-align: center; margin: 20px; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); position: relative; z-index: 10; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px) scale(0.92); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* Уведомления (Toasts) */
        #toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 15px 25px; border-radius: 12px; background: var(--card); backdrop-filter: blur(10px); border-left: 5px solid var(--primary); color: white; box-shadow: 0 10px 15px rgba(0,0,0,0.3); display: flex; align-items: center; gap: 12px; animation: toastIn 0.4s ease forwards; min-width: 200px; }
        @keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast.error { border-left-color: var(--danger); }
        .toast.success { border-left-color: var(--success); }

        .admin-trigger { position: fixed; top: 25px; right: 25px; cursor: pointer; padding: 10px; opacity: 0.5; transition: 0.4s; z-index: 100; color: white; }
        .admin-trigger:hover { opacity: 1; color: var(--primary); transform: rotate(180deg); }

        input { width: 100%; padding: 16px; margin: 10px 0; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); background: rgba(15, 23, 42, 0.9); color: white; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 16px; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.3); }

        button { width: 100%; padding: 16px; border-radius: 16px; border: none; background: var(--primary); color: white; font-weight: 700; cursor: pointer; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        button:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* Модалки */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; animation: fadeIn 0.3s; }
        .modal { width: 320px; padding: 30px; text-align: center; animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        #photo-wrapper { margin-top: 25px; border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); background: #000; height: 320px; display: none; cursor: grab; }
        #photo-display { width: 100%; height: 100%; }
        #photo-display img { width: 100%; height: 100%; object-fit: contain; }

        .admin-list { margin-top: 30px; text-align: left; max-height: 220px; overflow-y: auto; }
        .item { display: flex; align-items: center; justify-content: space-between; padding: 14px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div class="admin-trigger" onclick="showModal('auth-modal')"><i class="fas fa-fingerprint fa-2xl"></i></div>

    <div class="container glass" id="user-ui">
        <h2><i class="fas fa-ghost"></i> Rabbit Cloud</h2>
        <input type="text" id="user-key" placeholder="Введите код" inputmode="numeric">
        <button onclick="getPhoto()">Проверить базу</button>
        <div id="photo-wrapper"><div id="photo-display"></div></div>
    </div>

    <div class="container glass hidden" id="admin-ui">
        <h2><i class="fas fa-crown"></i> Admin Space</h2>
        <input type="text" id="admin-url" placeholder="URL изображения">
        <button onclick="addPhoto()">Создать ключ</button>
        <div class="admin-list" id="admin-list"></div>
        <button onclick="location.reload()" style="background:transparent; border:1px solid #475569; margin-top:20px;">Выйти</button>
    </div>

    <div class="modal-overlay" id="auth-modal">
        <div class="modal glass">
            <h3>Вход в систему</h3>
            <input type="password" id="admin-pass" placeholder="Пароль">
            <button onclick="checkPass()">Войти</button>
            <button onclick="closeModal('auth-modal')" style="background:transparent; color:#94a3b8; font-size:14px">Отмена</button>
        </div>
    </div>

    <div class="modal-overlay" id="confirm-modal">
        <div class="modal glass">
            <i class="fas fa-trash-can fa-3x" style="color:var(--danger); margin-bottom:15px"></i>
            <h3>Удалить?</h3>
            <p id="confirm-text" style="opacity:0.6; font-size:14px"></p>
            <button id="confirm-yes" style="background:var(--danger)">Удалить</button>
            <button onclick="closeModal('confirm-modal')" style="background:transparent">Отмена</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTcH3_tri2L7AHLh1e-YD-0s-QSthuE6Q",
            authDomain: "disk-c98ee.firebaseapp.com",
            databaseURL: "https://disk-c98ee-default-rtdb.firebaseio.com",
            projectId: "disk-c98ee",
            storageBucket: "disk-c98ee.firebasestorage.app",
            messagingSenderId: "59577059636",
            appId: "1:59577059636:web:e98f456d054cc360747d61"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let pz = null;
        let deleteKeyPending = null;

        // Система уведомлений
        function notify(msg, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            const icon = type === 'error' ? 'fa-circle-xmark' : (type === 'success' ? 'fa-circle-check' : 'fa-circle-info');
            toast.innerHTML = `<i class="fas ${icon}"></i><span>${msg}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 400); }, 3000);
        }

        function showModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function checkPass() {
            if(document.getElementById('admin-pass').value === "771") {
                closeModal('auth-modal');
                document.getElementById('user-ui').classList.add('hidden');
                document.getElementById('admin-ui').classList.remove('hidden');
                notify("Доступ разрешен", "success");
                loadList();
            } else { notify("Неверный пароль!", "error"); }
        }

        function addPhoto() {
            const url = document.getElementById('admin-url').value;
            if(!url) return notify("Введите ссылку", "error");
            const key = Math.floor(1000 + Math.random() * 9000);
            db.ref('photos/' + key).set({ url: url }, () => {
                notify(`Код ${key} создан!`, "success");
                document.getElementById('admin-url').value = '';
            });
        }

        function getPhoto() {
            const key = document.getElementById('user-key').value;
            if(!key) return notify("Введите код", "error");
            db.ref('photos/' + key).once('value').then((snap) => {
                const data = snap.val();
                if(data) {
                    document.getElementById('photo-wrapper').style.display = 'block';
                    document.getElementById('photo-display').innerHTML = `<img src="${data.url}" id="img-target">`;
                    if (pz) pz.destroy();
                    pz = new PinchZoom(document.getElementById('img-target'), { minZoom: 1, maxZoom: 6, wheelZoomFactor: 1.1 });
                    notify("Фото загружено", "success");
                } else { notify("Код не найден!", "error"); }
            });
        }

        function loadList() {
            db.ref('photos').on('value', (snap) => {
                const list = document.getElementById('admin-list');
                list.innerHTML = '';
                const data = snap.val();
                for(let key in data) {
                    list.innerHTML += `<div class="item"><span>Ключ: <b>${key}</b></span><i class="fas fa-trash" onclick="confirmDelete('${key}')" style="color:var(--danger); cursor:pointer;"></i></div>`;
                }
            });
        }

        function confirmDelete(key) {
            deleteKeyPending = key;
            document.getElementById('confirm-text').innerText = `Код ${key} будет удален.`;
            showModal('confirm-modal');
        }

        document.getElementById('confirm-yes').onclick = function() {
            db.ref('photos/' + deleteKeyPending).remove();
            closeModal('confirm-modal');
            notify("Удалено успешно", "success");
        };

        window.onclick = e => { if (e.target.className === 'modal-overlay') { closeModal('auth-modal'); closeModal('confirm-modal'); } }
    </script>
</body>
</html>
